<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B"/>
      <stop offset="100%" style="stop-color:#312E81"/>
    </linearGradient>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial" font-size="28" font-weight="bold" fill="white" text-anchor="middle">Knowledge Graph Build Pipeline</text>
  
  <!-- Step Boxes -->
  <!-- Step 1 -->
  <g transform="translate(50, 80)">
    <rect width="100" height="60" rx="10" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <text x="50" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Step 1</text>
    <text x="50" y="42" font-family="Arial" font-size="11" fill="#E0E7FF" text-anchor="middle">Extract L1</text>
  </g>
  
  <!-- Arrow 1 -->
  <path d="M 160 110 L 200 110" stroke="#818CF8" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <polygon points="200,105 215,110 200,115" fill="#818CF8"/>
  
  <!-- Step 2 -->
  <g transform="translate(220, 80)">
    <rect width="100" height="60" rx="10" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <text x="50" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Step 2</text>
    <text x="50" y="42" font-family="Arial" font-size="11" fill="#E0E7FF" text-anchor="middle">Extract Entities</text>
  </g>
  
  <!-- Arrow 2 -->
  <path d="M 330 110 L 370 110" stroke="#818CF8" stroke-width="2" fill="none"/>
  <polygon points="370,105 385,110 370,115" fill="#818CF8"/>
  
  <!-- Step 3 -->
  <g transform="translate(390, 80)">
    <rect width="100" height="60" rx="10" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <text x="50" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Step 3</text>
    <text x="50" y="42" font-family="Arial" font-size="11" fill="#E0E7FF" text-anchor="middle">Vectorize</text>
  </g>
  
  <!-- Arrow 3 -->
  <path d="M 500 110 L 540 110" stroke="#818CF8" stroke-width="2" fill="none"/>
  <polygon points="540,105 555,110 540,115" fill="#818CF8"/>
  
  <!-- Step 4 -->
  <g transform="translate(560, 80)">
    <rect width="100" height="60" rx="10" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <text x="50" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Step 4</text>
    <text x="50" y="42" font-family="Arial" font-size="11" fill="#E0E7FF" text-anchor="middle">Calibrate</text>
  </g>
  
  <!-- Arrow 4 -->
  <path d="M 670 110 L 670 160" stroke="#818CF8" stroke-width="2" fill="none"/>
  <polygon points="665,160 670,175 675,160" fill="#818CF8"/>
  
  <!-- Step 5 -->
  <g transform="translate(620, 180)">
    <rect width="100" height="60" rx="10" fill="url(#boxGrad)" filter="url(#shadow)"/>
    <text x="50" y="25" font-family="Arial" font-size="12" fill="white" text-anchor="middle">Step 5</text>
    <text x="50" y="42" font-family="Arial" font-size="11" fill="#E0E7FF" text-anchor="middle">Build Graph</text>
  </g>
  
  <!-- Data Flow Box -->
  <g transform="translate(50, 180)">
    <rect width="200" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="100" y="25" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Input Data</text>
    <text x="100" y="45" font-family="Arial" font-size="10" fill="#94A3B8" text-anchor="middle">目录.csv</text>
    <text x="100" y="60" font-family="Arial" font-size="10" fill="#94A3B8" text-anchor="middle">*.csv (chapters)</text>
  </g>
  
  <!-- Output Boxes -->
  <g transform="translate(620, 280)">
    <rect width="150" height="80" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="75" y="25" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Output</text>
    <text x="75" y="45" font-family="Arial" font-size="10" fill="#94A3B8" text-anchor="middle">Neo4j Graph</text>
    <text x="75" y="60" font-family="Arial" font-size="10" fill="#94A3B8" text-anchor="middle">Vector DB</text>
  </g>
  
  <!-- Arrow to Output -->
  <path d="M 670 250 L 670 275" stroke="#34D399" stroke-width="2" fill="none"/>
  <polygon points="665,275 670,290 675,275" fill="#34D399"/>
  
  <!-- Knowledge Hierarchy -->
  <g transform="translate(50, 300)">
    <rect width="200" height="140" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="100" y="25" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Knowledge Hierarchy</text>
    <text x="30" y="55" font-family="Arial" font-size="12" fill="#A5B4FC">L1</text>
    <text x="100" y="55" font-family="Arial" font-size="11" fill="#94A3B8">Top-level concepts</text>
    <text x="30" y="85" font-family="Arial" font-size="12" fill="#A5B4FC">L2</text>
    <text x="100" y="85" font-family="Arial" font-size="11" fill="#94A3B8">Sub-concepts</text>
    <text x="30" y="115" font-family="Arial" font-size="12" fill="#A5B4FC">L3</text>
    <text x="100" y="115" font-family="Arial" font-size="11" fill="#94A3B8">Detailed points</text>
  </g>
  
  <!-- Relationship Types -->
  <g transform="translate(280, 300)">
    <rect width="200" height="140" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="100" y="25" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Relationship Types</text>
    <text x="30" y="55" font-family="Arial" font-size="12" fill="#34D399">contains</text>
    <text x="100" y="55" font-family="Arial" font-size="11" fill="#94A3B8">Hierarchy (L1→L2→L3)</text>
    <text x="30" y="85" font-family="Arial" font-size="12" fill="#34D399">prerequisite</text>
    <text x="100" y="85" font-family="Arial" font-size="11" fill="#94A3B8">Learning prerequisites</text>
    <text x="30" y="115" font-family="Arial" font-size="12" fill="#34D399">has_resource</text>
    <text x="100" y="115" font-family="Arial" font-size="11" fill="#94A3B8">Linked resources</text>
  </g>
  
  <!-- Technology Stack -->
  <g transform="translate(510, 300)">
    <rect width="260" height="140" rx="8" fill="#1E293B" stroke="#475569" stroke-width="1"/>
    <text x="130" y="25" font-family="Arial" font-size="14" fill="white" text-anchor="middle">Tech Stack</text>
    <text x="30" y="55" font-family="Arial" font-size="12" fill="#F472B6">LLM</text>
    <text x="100" y="55" font-family="Arial" font-size="11" fill="#94A3B8">OpenAI / Qwen</text>
    <text x="30" y="85" font-family="Arial" font-size="12" fill="#F472B6">Vector DB</text>
    <text x="100" y="85" font-family="Arial" font-size="11" fill="#94A3B8">LanceDB</text>
    <text x="30" y="115" font-family="Arial" font-size="12" fill="#F472B6">Graph DB</text>
    <text x="100" y="115" font-family="Arial" font-size="11" fill="#94A3B8">Neo4j</text>
  </g>
  
  <!-- Version Badge -->
  <text x="750" y="485" font-family="Arial" font-size="10" fill="#64748B" text-anchor="end">v0.1.0</text>
</svg>
