<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="1600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333"/>
    </marker>
    <style>
      .title { font-family: 'Microsoft YaHei', sans-serif; font-size: 24px; font-weight: bold; }
      .subtitle { font-family: 'Microsoft YaHei', sans-serif; font-size: 16px; }
      .agent { font-family: 'Microsoft YaHei', sans-serif; font-size: 14px; }
      .label { font-family: 'Microsoft YaHei', sans-serif; font-size: 12px; }
      .box { rx: 8; ry: 8; }
    </style>
  </defs>

  <!-- 背景 -->
  <rect width="100%" height="100%" fill="#fafafa"/>

  <!-- 标题 -->
  <text x="600" y="40" text-anchor="middle" class="title">知识图谱构建 Agent 流程图</text>

  <!-- 输入区域 -->
  <rect x="50" y="80" width="160" height="80" fill="#fff3e0" stroke="#e65100" stroke-width="2" class="box"/>
  <text x="130" y="105" text-anchor="middle" class="subtitle" fill="#e65100">输入数据</text>
  <text x="130" y="125" text-anchor="middle" class="label">TOC文件</text>
  <text x="130" y="142" text-anchor="middle" class="label">教材CSV</text>

  <!-- Agent 1 -->
  <rect x="300" y="70" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="390" y="95" text-anchor="middle" class="subtitle" fill="#01579b">Agent 1</text>
  <text x="390" y="115" text-anchor="middle" class="agent" fill="#01579b">L1ExtractorAgent</text>
  <text x="390" y="135" text-anchor="middle" class="label">提取L1知识点</text>
  <text x="390" y="152" text-anchor="middle" class="label" fill="#666">Node 1</text>

  <!-- 验证循环箭头 -->
  <path d="M 420 170 L 420 220 L 380 220 L 380 250 L 340 250" fill="none" stroke="#f44336" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="440" y="240" class="label" fill="#f44336">验证失败</text>

  <!-- Agent 2 -->
  <rect x="300" y="270" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="390" y="295" text-anchor="middle" class="subtitle" fill="#01579b">Agent 2</text>
  <text x="390" y="315" text-anchor="middle" class="agent" fill="#01579b">L1ValidatorAgent</text>
  <text x="390" y="335" text-anchor="middle" class="label">验证L1质量</text>
  <text x="390" y="352" text-anchor="middle" class="label" fill="#666">Node 2</text>

  <!-- 验证通过箭头 -->
  <path d="M 480 320 L 550 320 L 550 390 L 590 390" fill="none" stroke="#4caf50" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="520" y="315" class="label" fill="#4caf50">验证通过</text>

  <!-- Agent 3 -->
  <rect x="610" y="360" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="385" text-anchor="middle" class="subtitle" fill="#01579b">Agent 3</text>
  <text x="700" y="405" text-anchor="middle" class="agent" fill="#01579b">L1PrerequisiteAgent</text>
  <text x="700" y="425" text-anchor="middle" class="label">提取前置关系</text>
  <text x="700" y="442" text-anchor="middle" class="label" fill="#666">Node 3</text>

  <!-- Agent 4 -->
  <rect x="610" y="500" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="525" text-anchor="middle" class="subtitle" fill="#01579b">Agent 4</text>
  <text x="700" y="545" text-anchor="middle" class="agent" fill="#01579b">EntityExtractorAgent</text>
  <text x="700" y="565" text-anchor="middle" class="label">提取L2/L3实体</text>
  <text x="700" y="582" text-anchor="middle" class="label" fill="#666">Node 4</text>

  <!-- Agent 5 -->
  <rect x="610" y="640" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="665" text-anchor="middle" class="subtitle" fill="#01579b">Agent 5</text>
  <text x="700" y="685" text-anchor="middle" class="agent" fill="#01579b">VectorizationAgent</text>
  <text x="700" y="705" text-anchor="middle" class="label">向量数据库</text>
  <text x="700" y="722" text-anchor="middle" class="label" fill="#666">Node 5</text>

  <!-- Agent 6 -->
  <rect x="610" y="780" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="805" text-anchor="middle" class="subtitle" fill="#01579b">Agent 6</text>
  <text x="700" y="825" text-anchor="middle" class="agent" fill="#01579b">CalibrationAgent</text>
  <text x="700" y="845" text-anchor="middle" class="label">数据校准去重</text>
  <text x="700" y="862" text-anchor="middle" class="label" fill="#666">Node 6</text>

  <!-- Agent 7 -->
  <rect x="610" y="920" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="945" text-anchor="middle" class="subtitle" fill="#01579b">Agent 7</text>
  <text x="700" y="965" text-anchor="middle" class="agent" fill="#01579b">EvaluationAgent</text>
  <text x="700" y="985" text-anchor="middle" class="label">质量评估</text>
  <text x="700" y="1002" text-anchor="middle" class="label" fill="#666">Node 7</text>

  <!-- Agent 8 -->
  <rect x="610" y="1060" width="180" height="100" fill="#e1f5fe" stroke="#01579b" stroke-width="2" class="box"/>
  <text x="700" y="1085" text-anchor="middle" class="subtitle" fill="#01579b">Agent 8</text>
  <text x="700" y="1105" text-anchor="middle" class="agent" fill="#01579b">GraphBuilderAgent</text>
  <text x="700" y="1125" text-anchor="middle" class="label">构建Neo4j图谱</text>
  <text x="700" y="1142" text-anchor="middle" class="label" fill="#666">Node 8</text>

  <!-- Neo4j -->
  <rect x="900" y="1080" width="160" height="60" fill="#ffebee" stroke="#c62828" stroke-width="2" class="box"/>
  <text x="980" y="1105" text-anchor="middle" class="subtitle" fill="#c62818">Neo4j</text>
  <text x="980" y="1125" text-anchor="middle" class="label">图数据库</text>

  <!-- 输出区域 -->
  <rect x="900" y="80" width="180" height="80" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" class="box"/>
  <text x="990" y="105" text-anchor="middle" class="subtitle" fill="#2e7d32">输出数据</text>
  <text x="990" y="125" text-anchor="middle" class="label">YAML/JSON</text>
  <text x="990" y="142" text-anchor="middle" class="label">CSV/Parquet</text>

  <!-- 连线 -->
  <path d="M 210 120 L 300 120" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 390 170 L 390 270" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 610 410 L 610 500" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 700 600 L 700 640" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 700 740 L 700 780" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 700 880 L 700 920" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 700 1020 L 700 1060" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 790 1110 L 900 1110" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 教材数据连接到Agent 4 -->
  <path d="M 130 140 L 130 200 L 610 200 L 610 360" fill="none" stroke="#333" stroke-width="2" stroke-dasharray="5,5" marker-end="url(#arrowhead)"/>
  <text x="150" y="210" class="label">教材内容</text>

  <!-- 输出连线 -->
  <path d="M 480 120 L 900 120" fill="none" stroke="#333" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- 图例 -->
  <rect x="50" y="1180" width="300" height="150" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="60" y="1210" class="subtitle">图例</text>
  <rect x="60" y="1225" width="20" height="15" fill="#fff3e0" stroke="#e65100" stroke-width="2"/>
  <text x="90" y="1237" class="label">输入数据</text>
  <rect x="60" y="1250" width="20" height="15" fill="#e1f5fe" stroke="#01579b" stroke-width="2"/>
  <text x="90" y="1262" class="label">Agent处理</text>
  <rect x="60" y="1275" width="20" height="15" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2"/>
  <text x="90" y="1287" class="label">输出数据</text>
  <rect x="60" y="1300" width="20" height="15" fill="#ffebee" stroke="#c62828" stroke-width="2"/>
  <text x="90" y="1312" class="label">数据库</text>

  <!-- 流程说明 -->
  <rect x="380" y="1180" width="450" height="150" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="390" y="1210" class="subtitle">处理流程说明</text>
  <text x="390" y="1235" class="label">1. L1Extractor: 从TOC提取L1知识点</text>
  <text x="390" y="1255" class="label">2. L1Validator: 验证L1质量（失败则循环）</text>
  <text x="390" y="1275" class="label">3. L1Prerequisite: 提取前置关系</text>
  <text x="390" y="1295" class="label">4. EntityExtractor: 提取L2/L3实体和资源</text>
  <text x="390" y="1315" class="label">5-8. 向量化→校准→评估→构建图谱</text>

  <!-- 反馈循环说明 -->
  <rect x="860" y="1180" width="250" height="150" fill="white" stroke="#ccc" stroke-width="1" rx="5"/>
  <text x="870" y="1210" class="subtitle">反馈循环</text>
  <text x="870" y="1235" class="label" fill="#f44336">验证失败时:</text>
  <text x="870" y="1255" class="label">Agent 2 → Agent 1</text>
  <text x="870" y="1275" class="label">重新提取L1知识点</text>
  <text x="870" y="1295" class="label">最多迭代3次</text>
  <text x="870" y="1315" class="label">验证通过后进入下一步</text>

  <!-- 版本信息 -->
  <text x="600" y="1380" text-anchor="middle" class="label" fill="#999">生成时间: 2026-03-10 | 知识图谱构建系统</text>
</svg>
