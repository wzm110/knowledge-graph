<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Knowledge Graph Builder · Interactive Matrix</title>
    <meta
      name="description"
      content="Interactive matrix demo for Knowledge Graph Builder (GitHub Pages)"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <main class="wrap">
      <header class="hero">
        <div class="heroText">
          <div class="kicker">Knowledge Graph Builder</div>
          <h1>交互矩阵 Demo</h1>
          <p class="sub">
            鼠标移动会驱动“数据流波纹”，矩阵会跟随响应。适合 README 的点击预览入口。
          </p>
          <div class="ctaRow">
            <a class="btn" href="../README_zh.md">返回项目 README</a>
            <a class="btn btnGhost" href="./?mode=calm">低强度模式</a>
          </div>
          <div class="hint">
            小贴士：移动鼠标、按住鼠标、或在移动端滑动屏幕。
          </div>
        </div>
        <div class="heroCard">
          <canvas id="matrix" width="980" height="640" aria-label="matrix-canvas"></canvas>
          <div class="legend">
            <div class="dot dotA"></div>
            <span>Graph</span>
            <div class="dot dotB"></div>
            <span>Pipeline</span>
            <div class="dot dotC"></div>
            <span>Evaluate → Refine</span>
          </div>
        </div>
      </header>

      <section class="panel">
        <h2>这是什么？</h2>
        <p>
          GitHub 的 README 不允许运行 JavaScript，所以完整版交互放在 GitHub Pages；
          README 里放预览图并链接到本页。
        </p>
      </section>
    </main>

    <script src="./assets/app.js"></script>
  </body>
</html>
