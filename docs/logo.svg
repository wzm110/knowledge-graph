<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="120" rx="20" fill="#1E1B4B"/>
  
  <!-- Network nodes -->
  <circle cx="80" cy="60" r="15" fill="url(#grad)" opacity="0.9"/>
  <circle cx="120" cy="35" r="10" fill="#818CF8" opacity="0.8"/>
  <circle cx="120" cy="85" r="10" fill="#818CF8" opacity="0.8"/>
  <circle cx="160" cy="60" r="12" fill="#A5B4FC" opacity="0.9"/>
  
  <!-- Connections -->
  <line x1="80" y1="60" x2="120" y2="35" stroke="#818CF8" stroke-width="2" opacity="0.6"/>
  <line x1="80" y1="60" x2="120" y2="85" stroke="#818CF8" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="35" x2="160" y2="60" stroke="#A5B4FC" stroke-width="2" opacity="0.6"/>
  <line x1="120" y1="85" x2="160" y2="60" stroke="#A5B4FC" stroke-width="2" opacity="0.6"/>
  
  <!-- Text -->
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white">Knowledge</text>
  <text x="200" y="80" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#A5B4FC">Graph</text>
  
  <!-- Subtitle -->
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="12" fill="#94A3B8">Education Knowledge System</text>
</svg>
