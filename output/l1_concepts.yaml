Concepts:
- aliases:
  - 矩阵与概率论
  - 线性代数及概率统计基础
  - 向量、矩阵与概率
  definition: 研究向量空间、线性变换、矩阵运算及其在随机变量、概率分布和统计推断中的应用的数学基础学科。
  id: l1-1
  level: L1
  name: 线性代数与概率基础
- aliases:
  - 分类模型
  - 监督分类方法
  - 判别模型
  definition: 分类算法是一类用于将数据样本映射到预定义类别标签的监督学习方法，其核心目标是通过学习输入特征与输出类别的映射关系，实现对未知样本的类别预测。
  id: l1-2
  level: L1
  name: 分类算法
- aliases:
  - 机器学习概论
  - 机器学习入门
  - 机器学习核心概念
  definition: 机器学习基础是指对机器学习的基本概念、主要算法类型及其应用框架的系统性介绍，涵盖监督学习、无监督学习和强化学习等核心范式，以及模型评估与选择的基本方法。
  id: l1-3
  level: L1
  name: 机器学习基础
- aliases:
  - 生成式模型
  - 生成性模型
  - 生成网络
  definition: 生成模型是一类通过学习数据分布并能够生成新样本的机器学习模型，其核心目标是模拟数据的潜在分布以合成符合该分布的新数据实例。
  id: l1-4
  level: L1
  name: 生成模型
- aliases:
  - 最优化方法
  - 优化技术
  - 数值优化
  - 算法优化
  definition: 优化算法是指用于求解目标函数极值问题的一类计算方法，通过迭代或解析方式在可行域内寻找最优解，区别于一般算法的通用性，其核心在于目标函数与约束条件的数学建模及求解策略。
  id: l1-5
  level: L1
  name: 优化算法
- aliases:
  - 注意力机制
  - 自注意力机制
  - 注意力模型
  definition: 注意力机制是一种通过动态计算输入元素间相关性以加权聚合信息的模型结构，自注意力模型则进一步允许模型在相同输入序列内部建立依赖关系，实现对局部与全局语义的捕捉。
  id: l1-6
  level: L1
  name: 注意力机制与自注意力模型
- aliases:
  - 图像识别与视觉计算
  - 视觉计算
  - 计算机视觉与图像理解
  definition: 计算机视觉是研究如何使计算机模拟人类视觉系统，以感知、理解并解释图像或视频内容的学科，涵盖图像处理、特征提取、目标检测、场景理解等核心技术和应用。
  id: l1-7
  level: L1
  name: 计算机视觉
- aliases:
  - NLP基础与实践
  - 自然语言处理概论
  - NLP技术与应用
  definition: 研究自然语言的结构、语义及生成机制，并探讨其在信息理解、文本生成、机器翻译等任务中的计算模型与应用方法的学科领域。
  id: l1-8
  level: L1
  name: 自然语言处理基础与应用
- aliases:
  - 深度学习基础与进展
  - 深度学习核心与趋势
  - 深度学习概论与研究方向
  definition: 本主题系统阐述深度学习的基本原理、典型模型结构及其在当前研究与应用中的最新发展与趋势。
  id: l1-9
  level: L1
  name: 深度学习概述与前沿
- aliases:
  - 神经网络概述
  - 神经网络简介
  - 神经网络原理
  definition: 神经网络基础是研究人工神经网络的基本结构、工作原理及其训练机制的学科领域，涵盖感知机、多层前馈网络、激活函数、损失函数与反向传播等核心概念。
  id: l1-10
  level: L1
  name: 神经网络基础
- aliases:
  - RNN与LSTM
  - 循环网络与LSTM模型
  - 递归神经网络与长短期记忆
  definition: 循环神经网络（RNN）是一类用于处理序列数据的神经网络架构，通过引入时间步的循环连接来建模序列依赖；长短期记忆网络（LSTM）是RNN的一种改进形式，通过门控机制有效缓解长期依赖问题。
  id: l1-11
  level: L1
  name: 循环神经网络与长短期记忆网络
- aliases:
  - 卷积网络
  - CNN
  - 卷积深度网络
  definition: 一种通过局部感受野、权值共享和层次化特征提取机制，专门用于处理具有网格结构数据（如图像）的深度神经网络架构。
  id: l1-12
  level: L1
  name: 卷积神经网络
